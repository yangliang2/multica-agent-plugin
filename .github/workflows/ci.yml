name: CI

on:
  push:
    branches: ["**"]
  pull_request:
    branches: ["**"]

jobs:
  syntax:
    name: Bash syntax check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Check hooks syntax
        run: |
          for f in hooks/*.sh tools/*.sh install.sh uninstall.sh; do
            [ -f "$f" ] || continue
            bash -n "$f" || exit 1
            echo "OK: $f"
          done

  smoke:
    name: Smoke tests
    runs-on: ubuntu-latest
    needs: syntax
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
      - name: Run tests
        run: npm test
