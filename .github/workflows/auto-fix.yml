name: Auto-fix CI failures

on:
  workflow_run:
    workflows: ["CI"]
    types: [completed]

jobs:
  auto-fix:
    if: >
      github.event.workflow_run.conclusion == 'failure' &&
      github.event.workflow_run.head_branch != github.event.repository.default_branch
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write

    steps:
      - name: Checkout trusted automation
        uses: actions/checkout@v4.3.1
        with:
          ref: ${{ github.event.repository.default_branch }}
          fetch-depth: 0
          path: trusted

      - name: Checkout PR branch
        uses: actions/checkout@v4.3.1
        with:
          ref: ${{ github.event.workflow_run.head_sha }}
          fetch-depth: 0
          path: pr
          persist-credentials: false

      - uses: actions/setup-node@v4.4.0
        with:
          node-version: "20"

      - name: Install shellcheck
        run: sudo apt-get install -y shellcheck

      - name: Collect failure logs
        id: logs
        run: |
          gh run view "$RUN_ID" -R "$GITHUB_REPOSITORY" --log-failed 2>&1 | head -200 > /tmp/failed-log.txt || true
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          RUN_ID: ${{ github.event.workflow_run.id }}

      - name: Run local checks and collect output
        id: local_checks
        working-directory: pr
        run: |
          shellcheck -S warning hooks/*.sh tools/*.sh uninstall.sh > /tmp/local-shellcheck.txt 2>&1 || true

      - name: Initialize auto-fix outputs
        run: |
          echo "PATCHES_APPLIED=0" >> "$GITHUB_ENV"
          {
            echo "FIX_ANALYSIS<<EOF_AUTOFIX_INIT"
            echo "auto-fix did not run"
            echo "EOF_AUTOFIX_INIT"
            echo "MODIFIED_FILES<<EOF_AUTOFIX_INIT"
            echo "EOF_AUTOFIX_INIT"
          } >> "$GITHUB_ENV"

      - name: Call Claude API for fix
        id: claude_fix
        working-directory: pr
        continue-on-error: true
        run: node ../trusted/.github/scripts/ci-autofix.js
        env:
          ANTHROPIC_AUTH_TOKEN: ${{ secrets.ANTHROPIC_AUTH_TOKEN }}
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          ANTHROPIC_BASE_URL: ${{ secrets.ANTHROPIC_BASE_URL }}
          FAILED_LOG_FILE: /tmp/failed-log.txt
          LOCAL_SHELLCHECK_FILE: /tmp/local-shellcheck.txt

      - name: Verify fix locally
        if: env.PATCHES_APPLIED != '' && env.PATCHES_APPLIED != '0'
        working-directory: pr
        env:
          GITHUB_ENV: /tmp/verify-env-blocked
          GITHUB_PATH: /tmp/verify-path-blocked
          GITHUB_OUTPUT: /tmp/verify-output-blocked
          GITHUB_STATE: /tmp/verify-state-blocked
          GITHUB_STEP_SUMMARY: /tmp/verify-step-summary-blocked
        run: |
          bash -n hooks/stop.sh hooks/session-start.sh hooks/pre-tool.sh
          shellcheck -S warning hooks/*.sh tools/*.sh uninstall.sh
          npm ci --ignore-scripts
          npm test

      - name: Commit and push fix
        if: env.PATCHES_APPLIED != '' && env.PATCHES_APPLIED != '0'
        working-directory: pr
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          FIX_ANALYSIS: ${{ env.FIX_ANALYSIS }}
          MODIFIED_FILES: ${{ env.MODIFIED_FILES }}
          PR_BRANCH: ${{ github.event.workflow_run.head_branch }}
        run: |
          git check-ref-format --branch "$PR_BRANCH"
          git remote set-url origin "https://x-access-token:${GITHUB_TOKEN}@github.com/${GITHUB_REPOSITORY}.git"
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          while IFS= read -r f; do
            [[ -n "$f" ]] && git add -- "$f"
          done <<< "$MODIFIED_FILES"
          git diff --cached --quiet && echo "Nothing to commit" && exit 0
          cat > /tmp/commit-msg.txt <<EOF
          fix(auto): ${FIX_ANALYSIS}

          Automated fix generated by Claude (haiku-4-5) in response to CI failure.
          Run: ${{ github.event.workflow_run.id }}
          EOF
          git commit -F /tmp/commit-msg.txt
          git push origin "HEAD:${PR_BRANCH}"

      - name: Comment on PR if fix applied
        if: env.PATCHES_APPLIED != '' && env.PATCHES_APPLIED != '0'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          FIX_ANALYSIS: ${{ env.FIX_ANALYSIS }}
          PR_BRANCH: ${{ github.event.workflow_run.head_branch }}
        run: |
          git check-ref-format --branch "$PR_BRANCH"
          PR_NUM=$(gh pr list -R "$GITHUB_REPOSITORY" --head "$PR_BRANCH" --json number --jq '.[0].number' 2>/dev/null || echo "")
          if [[ -n "$PR_NUM" ]]; then
            BODY=$(cat <<EOF
            🤖 **Auto-fix applied** — CI failure was detected and a fix was pushed automatically.

            **Analysis:** ${FIX_ANALYSIS}

            Re-running CI on the new commit. Review the changes before merging.
            EOF
            )
            gh pr comment -R "$GITHUB_REPOSITORY" "$PR_NUM" --body "$BODY"
          fi

      - name: Comment on PR if no fix found
        if: env.PATCHES_APPLIED == '0'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          FIX_ANALYSIS: ${{ env.FIX_ANALYSIS }}
          PR_BRANCH: ${{ github.event.workflow_run.head_branch }}
        run: |
          git check-ref-format --branch "$PR_BRANCH"
          PR_NUM=$(gh pr list -R "$GITHUB_REPOSITORY" --head "$PR_BRANCH" --json number --jq '.[0].number' 2>/dev/null || echo "")
          if [[ -n "$PR_NUM" ]]; then
            BODY=$(cat <<EOF
            🤖 **Auto-fix attempted but could not generate a patch.**

            **Analysis:** ${FIX_ANALYSIS}

            Manual intervention required. Check the CI logs for details.
            EOF
            )
            gh pr comment -R "$GITHUB_REPOSITORY" "$PR_NUM" --body "$BODY"
          fi
