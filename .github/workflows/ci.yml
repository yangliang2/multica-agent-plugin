name: CI

on:
  push:
    branches: ["**"]
  pull_request:
    branches: ["**"]

jobs:
  syntax:
    name: Bash syntax check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4.3.1
      - name: Check hooks syntax
        run: |
          for f in hooks/*.sh tools/*.sh install.sh uninstall.sh; do
            [ -f "$f" ] || continue
            bash -n "$f" || exit 1
            echo "OK: $f"
          done

  shellcheck:
    name: shellcheck
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4.3.1
      - name: Install shellcheck
        run: sudo apt-get install -y shellcheck
      - name: Run shellcheck
        run: |
          shellcheck -S warning hooks/*.sh tools/*.sh uninstall.sh || true
          # install.sh exits 1 by design (deprecated redirect) — skip it
          shellcheck -S warning hooks/*.sh tools/*.sh uninstall.sh

  smoke:
    name: Smoke tests
    runs-on: ubuntu-latest
    needs: syntax
    steps:
      - uses: actions/checkout@v4.3.1
      - uses: actions/setup-node@v4.4.0
        with:
          node-version: "20"
      - name: Run tests
        run: npm test

  unit:
    name: Node.js unit tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4.3.1
      - uses: actions/setup-node@v4.4.0
        with:
          node-version: "20"
      - name: Run unit tests
        run: npm run test:unit
